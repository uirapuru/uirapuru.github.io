<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    user-select: none;
}
#top {
    height: 66.66vh;
    width: 100vw;
}
#bottom {
    height: 33.33vh;
    width: 100vw;
    background: white;
    padding: 20px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    overflow-y: auto;
}
canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
}
.control {
    display: flex;
    flex-direction: column;
}
label {
    font-size: 14px;
    margin-bottom: 5px;
    font-weight: bold;
}
</style>
</head>
<body>
<div id="top">
    <canvas id="sim"></canvas>
</div>
<div id="bottom">
    <div class="control">
        <label>Kąt lufy: <span id="angleVal"></span>&deg;</label>
        <input type="range" id="angleSlider" min="-30" max="30" value="-5" step="0.5">
    </div>
    <div class="control">
        <label>Montaż optyki: <span id="opticVal"></span>&deg;</label>
        <input type="range" id="opticSlider" min="-15" max="15" value="-1" step="0.1">
    </div>
    <div class="control">
        <label>Prędkość wylotowa: <span id="velVal"></span> m/s</label>
        <input type="range" id="velSlider" min="300" max="1200" value="800" step="10">
    </div>
    <div class="control">
        <label>Temperatura: <span id="tempVal"></span> &deg;C</label>
        <input type="range" id="tempSlider" min="-30" max="50" value="15" step="1">
    </div>
    <div class="control">
        <label>Ciśnienie atm.: <span id="pressVal"></span> hPa</label>
        <input type="range" id="pressSlider" min="800" max="1100" value="1013" step="1">
    </div>
    <div class="control">
        <label>Wilgotność: <span id="humVal"></span> %</label>
        <input type="range" id="humSlider" min="0" max="100" value="50" step="1">
    </div>
    <div class="control">
        <label>Gęstość powietrza: <span id="densVal"></span> kg/m&sup3;</label>
        <input type="range" id="densSlider" min="0.8" max="1.5" step="0.01" disabled>
    </div>
</div>
<script>
const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

const angleSlider = document.getElementById("angleSlider");
const opticSlider = document.getElementById("opticSlider");
const velSlider = document.getElementById("velSlider");
const tempSlider = document.getElementById("tempSlider");
const pressSlider = document.getElementById("pressSlider");
const humSlider = document.getElementById("humSlider");
const densSlider = document.getElementById("densSlider");

const angleVal = document.getElementById("angleVal");
const opticVal = document.getElementById("opticVal");
const velVal = document.getElementById("velVal");
const tempVal = document.getElementById("tempVal");
const pressVal = document.getElementById("pressVal");
const humVal = document.getElementById("humVal");
const densVal = document.getElementById("densVal");

// God mode state
let godModeActive = false;
let inputBuffer = "";
const godModeCode = "iddqd";
let currentFrameCount = 0;
let targetBurning = false;

function resize() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}
window.addEventListener("resize", resize);

function updateAllVariables() {
    const T = parseFloat(tempSlider.value);
    const P = parseFloat(pressSlider.value);
    const H = parseFloat(humSlider.value);

    const Tk = T + 273.15;
    const P_pa = P * 100;
    const P_sat = 610.78 * Math.pow(10, (7.5 * T) / (T + 237.3));
    const P_v = (H / 100) * P_sat;
    const P_d = P_pa - P_v;

    const rho = (P_d / (287.058 * Tk)) + (P_v / (461.495 * Tk));
    
    densSlider.value = rho.toFixed(3);
    
    angleVal.innerText = angleSlider.value;
    opticVal.innerText = opticSlider.value;
    velVal.innerText = velSlider.value;
    tempVal.innerText = tempSlider.value;
    pressVal.innerText = pressSlider.value;
    humVal.innerText = humSlider.value;
    densVal.innerText = rho.toFixed(3);

    return rho;
}

function render(rho, frameCount) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const h = canvas.height;
    const w = canvas.width;
    const groundY = h * (2/3);
    
    // Background color based on God Mode
    if (godModeActive) {
        ctx.fillStyle = "#800"; // Dark red sky
    } else {
        ctx.fillStyle = "#87CEEB"; // Light blue sky
    }
    ctx.fillRect(0, 0, w, groundY);
    
    // Ground color based on God Mode
    if (godModeActive) {
        ctx.fillStyle = "#013220"; // Dark green ground
    } else {
        ctx.fillStyle = "#228B22"; // Green ground
    }
    ctx.fillRect(0, groundY, w, h - groundY);

    const targetX = w - 60;
    const targetH = 120;
    const targetW = 30;
    const targetCY = groundY - targetH / 2;

    for (let i = 3; i > 0; i--) {
        ctx.fillStyle = "white";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(targetX, targetCY, (targetW/2) * (i/3), (targetH/2) * (i/3), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
    }

    const angleDeg = parseFloat(angleSlider.value);
    const angleRad = angleDeg * Math.PI / 180;
    
    const opticDeg = parseFloat(opticSlider.value);
    const opticRad = opticDeg * Math.PI / 180;
    const losAngleRad = angleRad + opticRad;

    const pivotX = 50;
    const pivotY = groundY - 30;
    
    ctx.save();
    ctx.translate(pivotX, pivotY);
    ctx.rotate(angleRad);
    
    ctx.fillStyle = "#333";
    ctx.fillRect(-20, -5, 70, 10);
    ctx.fillRect(5, -18, 30, 8);
    ctx.restore();

    const scopeLocalY = -14;
    const scopeLocalX = 20;
    
    const scopeX = pivotX + Math.cos(angleRad) * scopeLocalX - Math.sin(angleRad) * scopeLocalY;
    const scopeY = pivotY + Math.sin(angleRad) * scopeLocalX + Math.cos(angleRad) * scopeLocalY;

    ctx.strokeStyle = "#333";
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(scopeX, scopeY);
    const losLength = w * 2;
    ctx.lineTo(scopeX + Math.cos(losAngleRad) * losLength, scopeY + Math.sin(losAngleRad) * losLength);
    ctx.stroke();
    ctx.setLineDash([]);

    // Barrel position
    const barrelLocalX = 50;
    const barrelLocalY = 0;
    let bx = pivotX + Math.cos(angleRad) * barrelLocalX - Math.sin(angleRad) * barrelLocalY;
    let by = pivotY + Math.sin(angleRad) * barrelLocalX + Math.cos(angleRad) * barrelLocalY;
    
    let currentLaserHitTarget = false;

    if (godModeActive) {
        // Red laser beam in God Mode
        ctx.strokeStyle = "red";
        ctx.lineWidth = 4;
        ctx.setLineDash([]); // Ensure no dashes
        ctx.beginPath();
        ctx.moveTo(bx, by);

        // Calculate laser end point (straight line, ignore physics)
        const tanA = Math.tan(angleRad);
        
        // Find intersection with ground
        // Ground is y = groundY, line is y = tan(angleRad) * (x - bx) + by
        // groundY = tanA * (endX_ground - bx) + by => endX_ground = bx + (groundY - by) / tanA
        let endX_ground;
        if (tanA === 0) {
            endX_ground = w + 100; // Never intersects horizontal ground
        } else {
            endX_ground = bx + (groundY - by) / tanA;
        }

        // Find intersection with target plane (vertical line at targetX)
        // targetY = tanA * (targetX - bx) + by
        const endY_target = tanA * (targetX - bx) + by;

        let laserEndX, laserEndY;
        // Logic to draw laser to first obstacle
        if (tanA === 0) { // Horizontal laser
            if (bx < targetX) {
                laserEndX = targetX;
                laserEndY = by;
                if (laserEndY >= groundY - targetH && laserEndY <= groundY) {
                    currentLaserHitTarget = true;
                }
            } else {
                laserEndX = w + 100; // Goes off screen right
                laserEndY = by;
            }
        } else if (tanA < 0) { // Laser points up. Hits target or top edge.
            laserEndX = targetX;
            laserEndY = endY_target;
            if (laserEndY >= groundY - targetH && laserEndY <= groundY) {
                currentLaserHitTarget = true;
            } else if (laserEndY < 0) { // Intersects top edge first
                laserEndX = bx - by / tanA;
                laserEndY = 0;
            }
        } else { // Laser points down. Ground or target.
            // Compare intersection X values to find first hit
            if (endX_ground < targetX) { // Hits ground before target plane
                laserEndX = endX_ground;
                laserEndY = groundY;
            } else { // Hits target plane before ground
                laserEndX = targetX;
                laserEndY = endY_target;
                if (laserEndY >= groundY - targetH && laserEndY <= groundY) {
                    currentLaserHitTarget = true;
                }
            }
        }

        ctx.lineTo(laserEndX, laserEndY);
        ctx.stroke();

        targetBurning = currentLaserHitTarget;

    } else {
        // Regular physics-based projectile
        ctx.strokeStyle = "red";
        ctx.lineWidth = 2;
        ctx.setLineDash([]); // Reset line dash to solid for projectile path
        ctx.beginPath();
        ctx.moveTo(bx, by);

        const v0 = parseFloat(velSlider.value) / 20;
        
        let vx = v0 * Math.cos(angleRad);
        let vy = v0 * Math.sin(angleRad);
        const g = 0.19;
        const dragMultiplier = 0.00022;

        let hitGround = false;
        let prevDistLoS = null;
        const intersections = [];
        const targetHits = [];

        for (let t = 0; t < 1200; t++) {
            let currentV = Math.sqrt(vx * vx + vy * vy);
            let Fd = dragMultiplier * rho * currentV * currentV;
            
            vx += -Fd * (vx / currentV);
            vy += g - Fd * (vy / currentV);

            let prevBx = bx;
            let prevBy = by;

            bx += vx;
            by += vy;
            
            if (!hitGround) {
                ctx.lineTo(bx, by);
            }

            if (prevBx < targetX && bx >= targetX && !hitGround) {
                let ratio = (targetX - prevBx) / (bx - prevBx);
                let hitY = prevBy + ratio * (by - prevBy);
                if (hitY >= groundY - targetH && hitY <= groundY) {
                    targetHits.push({x: targetX, y: hitY});
                }
            }

            if (!hitGround && by >= groundY) {
                hitGround = true;
                ctx.stroke();
                
                ctx.strokeStyle = "black";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(bx - 6, groundY - 6);
                ctx.lineTo(bx + 6, groundY + 6);
                ctx.moveTo(bx + 6, groundY - 6);
                ctx.lineTo(bx - 6, groundY + 6);
                ctx.stroke();
            }

            if (!hitGround) {
                let distLoS = -(bx - scopeX) * Math.sin(losAngleRad) + (by - scopeY) * Math.cos(losAngleRad);
                if (prevDistLoS !== null) {
                    if ((prevDistLoS > 0 && distLoS <= 0) || (prevDistLoS < 0 && distLoS >= 0)) {
                        intersections.push({x: bx, y: by});
                    }
                }
                prevDistLoS = distLoS;
            }
        }
        
        if (!hitGround) {
            ctx.stroke();
        }

        ctx.fillStyle = "green";
        intersections.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.fillStyle = "red";
        targetHits.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
            ctx.fill();
        });

        targetBurning = false; // No flames in regular mode
    }

    // Flame animation if target is burning
    if (targetBurning) {
        // Create flickering orange/yellow flames
        const numFlames = 10 + (Math.sin(frameCount * 0.1) * 5); // count flickers
        for (let i = 0; i < numFlames; i++) {
            const offsetX = (Math.random() - 0.5) * targetW;
            const offsetY = (Math.random() - 0.5) * targetH / 2;
            const radius = 5 + Math.random() * 10;
            const fx = targetX + offsetX;
            const fy = targetCY + offsetY;

            // flicker color and alpha
            const hue = 10 + Math.random() * 30; // 10-40, orange-yellow range
            const saturation = 90 + Math.random() * 10;
            const lightness = 40 + Math.random() * 20;
            const alpha = 0.5 + Math.random() * 0.5;
            ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;

            ctx.beginPath();
            ctx.arc(fx, fy, radius, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

// Add event listener for God Mode detection
window.addEventListener("keydown", (e) => {
    inputBuffer += e.key.toLowerCase();
    if (inputBuffer.length > 20) {
        inputBuffer = inputBuffer.slice(-20);
    }
    if (inputBuffer.endsWith(godModeCode)) {
        godModeActive = !godModeActive;
        inputBuffer = ""; // Reset buffer
    }
});

// Create continuous loop for flame animation
function loop() {
    const rho = updateAllVariables();
    render(rho, currentFrameCount);
    currentFrameCount++;
    requestAnimationFrame(loop);
}

let isDragging = false;
let lastMouseX = 0;
let lastMouseY = 0;

canvas.addEventListener("mousedown", (e) => {
    isDragging = true;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
});

window.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    const deltaX = e.clientX - lastMouseX;
    const deltaY = e.clientY - lastMouseY;

    let newAngle = parseFloat(angleSlider.value) + (deltaY * 0.1);
    if (newAngle > parseFloat(angleSlider.max)) newAngle = parseFloat(angleSlider.max);
    if (newAngle < parseFloat(angleSlider.min)) newAngle = parseFloat(angleSlider.min);
    angleSlider.value = newAngle;

    let newVel = parseFloat(velSlider.value) + (deltaX * 2);
    if (newVel > parseFloat(velSlider.max)) newVel = parseFloat(velSlider.max);
    if (newVel < parseFloat(velSlider.min)) newVel = parseFloat(velSlider.min);
    velSlider.value = newVel;

    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
});

window.addEventListener("mouseup", () => {
    isDragging = false;
});

canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    let newOptic = parseFloat(opticSlider.value) - Math.sign(e.deltaY) * 0.5;
    if (newOptic > parseFloat(opticSlider.max)) newOptic = parseFloat(opticSlider.max);
    if (newOptic < parseFloat(opticSlider.min)) newOptic = parseFloat(opticSlider.min);
    opticSlider.value = newOptic;
}, { passive: false });

resize();
loop();
</script>
</body>
</html>
